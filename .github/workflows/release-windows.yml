name: Release Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Notify Telegram (start)
        shell: pwsh
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          $ref = "${{ github.ref_name }}"
          $sha = "${{ github.sha }}".Substring(0,7)
          $runUrl = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          $msg = "🚀 *Masko Build started*`nBranch: ``$ref`` ($sha)`n[View run]($runUrl)"
          $body = @{ chat_id = $env:TG_CHAT; text = $msg; parse_mode = "Markdown"; disable_web_page_preview = "true" }
          Invoke-RestMethod -Uri "https://api.telegram.org/bot$($env:TG_TOKEN)/sendMessage" -Method Post -Body $body | Out-Null

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Masko v__VERSION__"
          releaseBody: "See the assets to download and install this version."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true

      - name: Upload portable exe
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $exe = Get-ChildItem "src-tauri/target/release/masko-windows.exe" -ErrorAction SilentlyContinue
          if ($exe) {
            $name = "Masko-${tag}-portable.exe"
            Copy-Item $exe.FullName $name
            gh release upload $tag $name --clobber
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Telegram
        if: always()
        shell: pwsh
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          $status = "${{ job.status }}"
          $ref = "${{ github.ref_name }}"
          $sha = "${{ github.sha }}".Substring(0,7)
          $runUrl = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          $emoji = if ($status -eq "success") { "✅" } else { "❌" }
          $msg = "$emoji *Masko Build $status*`nBranch: ``$ref`` ($sha)`n[View run]($runUrl)"
          $body = @{ chat_id = $env:TG_CHAT; text = $msg; parse_mode = "Markdown"; disable_web_page_preview = "true" }
          Invoke-RestMethod -Uri "https://api.telegram.org/bot$($env:TG_TOKEN)/sendMessage" -Method Post -Body $body | Out-Null
